<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Project Name] — Overview</title>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Patrick Hand', cursive;
      font-size: 16px; line-height: 1.6; color: #2d2d2d;
      background-color: #fdfbf7;
      background-image: radial-gradient(#e5e0d8 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .page-header {
      background: #fff9c4;
      border-bottom: 3px solid #2d2d2d;
      box-shadow: 0 4px 0px 0px #2d2d2d;
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      position: relative; z-index: 10;
    }
    .page-header h1 {
      font-family: 'Kalam', cursive; font-size: 2.8rem; font-weight: 700;
      color: #2d2d2d; display: inline-block; transform: rotate(-1deg);
    }
    .page-header .subtitle { font-size: 1.1rem; color: #2d2d2d; opacity: 0.8; margin-top: 0.5rem; }
    .badge-row { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-top: 0.75rem; }
    .badge {
      background: #fff; border: 2px solid #2d2d2d;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      padding: 0.2rem 0.75rem; font-size: 0.85rem;
      font-family: 'Patrick Hand', cursive;
      box-shadow: 3px 3px 0px 0px #2d2d2d;
    }
    .layout { display: flex; min-height: calc(100vh - 130px); }
    .sidebar {
      width: 220px; flex-shrink: 0;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
      padding: 1.5rem 1rem;
      background: #fff;
      border-right: 3px solid #2d2d2d;
      box-shadow: 4px 0px 0px 0px #2d2d2d;
    }
    .sidebar h3 {
      font-family: 'Kalam', cursive; font-size: 1rem; font-weight: 700;
      color: #2d2d2d; margin-bottom: 0.75rem;
      border-bottom: 2px dashed #2d2d2d; padding-bottom: 0.5rem;
    }
    .sidebar ul { list-style: none; padding: 0; }
    .sidebar ul li { margin: 0.4rem 0; }
    .sidebar ul li a {
      display: block; padding: 0.35rem 0.6rem;
      color: #2d2d2d; text-decoration: none;
      font-family: 'Patrick Hand', cursive; font-size: 0.9rem;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      border: 2px solid transparent;
      transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
    }
    .sidebar ul li a:hover {
      background: #fdfbf7; border-color: #2d2d2d;
      box-shadow: 2px 2px 0px 0px #2d2d2d;
      transform: rotate(-1deg);
    }
    .sidebar ul li a.active {
      background: #ff4d4d; color: #fff;
      border-color: #2d2d2d; box-shadow: 3px 3px 0px 0px #2d2d2d;
    }
    .sidebar ul ul { padding-left: 0.75rem; margin-top: 0.2rem; }
    .sidebar ul ul li { margin: 0.2rem 0; }
    .sidebar ul ul li a {
      font-size: 0.8rem; padding: 0.2rem 0.5rem; color: #555;
      border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;
    }
    .sidebar ul ul li a:hover { color: #2d2d2d; }
    .sidebar ul ul li a.active {
      background: #2d5da1; color: #fff;
      border-color: #2d2d2d; box-shadow: 2px 2px 0px 0px #2d2d2d;
    }
    main { flex: 1; max-width: 820px; margin: 2rem auto; padding: 0 1.5rem; }
    .section {
      background: #fff;
      border: 3px solid #2d2d2d;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      margin-bottom: 2rem; overflow: hidden;
      box-shadow: 6px 6px 0px 0px #2d2d2d;
      transform: rotate(-0.3deg);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .section:hover { transform: rotate(0deg); box-shadow: 8px 8px 0px 0px #2d2d2d; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem; cursor: pointer; user-select: none;
      border-bottom: 2px dashed #2d2d2d;
      background: #fdfbf7;
    }
    .section-header h2 { font-family: 'Kalam', cursive; font-size: 1.3rem; font-weight: 700; color: #2d2d2d; }
    .section-header .toggle { font-size: 1rem; color: #2d2d2d; }
    .section-body { padding: 1.5rem; }
    .section-body.collapsed { display: none; }
    h3 { font-family: 'Kalam', cursive; font-size: 1.1rem; font-weight: 700; margin: 1rem 0 0.5rem; color: #2d2d2d; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th {
      background: #e5e0d8; text-align: left; padding: 0.6rem 1rem;
      font-family: 'Kalam', cursive; font-weight: 700; font-size: 0.85rem; color: #2d2d2d;
      border: 2px solid #2d2d2d;
    }
    td { padding: 0.6rem 1rem; border: 1px solid #e5e0d8; vertical-align: top; }
    tr:hover td { background: #fdfbf7; }
    pre.tree {
      font-family: "SFMono-Regular", Consolas, monospace; font-size: 0.85rem;
      line-height: 1.7; background: #fdfbf7;
      border: 2px dashed #2d2d2d;
      border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;
      padding: 1rem 1.25rem; overflow-x: auto;
    }
    code {
      font-family: "SFMono-Regular", Consolas, monospace; font-size: 0.85em;
      background: #e5e0d8; border-radius: 4px; padding: 0.1em 0.35em;
    }
    pre:not(.tree) {
      background: #2d2d2d; color: #fdfbf7;
      border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;
      border: 2px solid #2d2d2d;
      padding: 1rem 1.25rem; overflow-x: auto; line-height: 1.6;
      box-shadow: 4px 4px 0px 0px #2d2d2d;
    }
    pre:not(.tree) code { background: none; padding: 0; font-size: 0.85rem; color: #fdfbf7; }
    .mermaid { text-align: center; padding: 1rem 0; }
    ul, ol { padding-left: 1.5rem; }
    li { margin: 0.3rem 0; }
    p + p { margin-top: 0.75rem; }
    footer { text-align: center; color: #888; font-size: 0.85rem; padding: 2rem 0 3rem; font-family: 'Patrick Hand', cursive; }
  </style>
</head>
<body>
<header class="page-header">
  <h1>[Project Name]</h1>
  <p class="subtitle">[One-line purpose]</p>
  <div class="badge-row">
    <span class="badge">[Language]</span>
    <span class="badge">[Framework]</span>
    <!-- add one badge per major stack element -->
  </div>
</header>
<div class="layout">
  <nav class="sidebar">
    <h3>Contents</h3>
    <ul>
      <!-- Add one <li> per selected section with nested sub-links, e.g.: -->
      <!--
      <li>
        <a href="#overview">Overview</a>
        <ul>
          <li><a href="#overview-tech-stack">Tech Stack</a></li>
          <li><a href="#overview-directory-tree">Directory Tree</a></li>
          <li><a href="#overview-entry-points">Entry Points</a></li>
          <li><a href="#overview-quick-start">Quick Start</a></li>
        </ul>
      </li>
      <li>
        <a href="#feature-introduction">Feature Introduction</a>
        <ul>
          <li><a href="#feature-what-is-this">What is this?</a></li>
          <li><a href="#feature-key-features">Key Features</a></li>
          <li><a href="#feature-who-is-it-for">Who is it for?</a></li>
          <li><a href="#feature-how-it-works">How it works</a></li>
        </ul>
      </li>
      <li>
        <a href="#deep-dive">Deep-dive</a>
        <ul>
          <li><a href="#deep-architecture">Architecture</a></li>
          <li><a href="#deep-key-modules">Key Modules</a></li>
          <li><a href="#deep-data-flow">Data Flow</a></li>
          <li><a href="#deep-design-patterns">Design Patterns</a></li>
          <li><a href="#deep-dependencies">Dependencies</a></li>
        </ul>
      </li>
      -->
    </ul>
  </nav>
  <main>
    <!-- Repeat this block for each section. Use id="overview", "feature-introduction", or "deep-dive".
         Each subsection heading uses <h3 id="[subsection-id]"> so sidebar sub-links scroll to it. -->
    <div class="section" id="[section-id]">
      <div class="section-header" onclick="toggle(this)">
        <h2>Section Title</h2>
        <span class="toggle">▾</span>
      </div>
      <div class="section-body">
        <h3 id="[subsection-id]">Subsection Title</h3>
        <!-- subsection content -->
      </div>
    </div>
    <footer>Generated by /code-brief · [Date]</footer>
  </main>
</div>
<script>
  mermaid.initialize({ startOnLoad: true, theme: 'neutral', securityLevel: 'loose' });
  function toggle(header) {
    const body = header.nextElementSibling;
    const isCollapsed = body.classList.toggle('collapsed');
    header.querySelector('.toggle').textContent = isCollapsed ? '▸' : '▾';
  }
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        const isSection = entry.target.classList.contains('section');
        if (isSection) {
          document.querySelectorAll('.sidebar > ul > li > a').forEach(l => l.classList.remove('active'));
        }
        document.querySelectorAll('.sidebar ul ul li a').forEach(l => l.classList.remove('active'));
        const a = document.querySelector('.sidebar a[href="#' + id + '"]');
        if (a) a.classList.add('active');
      }
    });
  }, { threshold: 0.3 });
  document.querySelectorAll('.section').forEach(s => observer.observe(s));
  document.querySelectorAll('.section-body h3[id]').forEach(h => observer.observe(h));
</script>
</body>
</html>
